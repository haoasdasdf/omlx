name: Sync fork

on:
  schedule:
    - cron: "15 */3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Sync fork with upstream
        run: gh repo sync ${{ github.repository }} -b ${{ github.event.repository.default_branch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
